name: Build and publish Docker image

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:  # allows manual trigger from GitHub Actions UI

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-base:
    name: Build :base (hermes only, no vLLM)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :base on every main push
            type=raw,value=base,enable={{is_default_branch}}
            # :v1.2.3-base on version tags
            type=semver,pattern={{version}},suffix=-base
            # :sha-abc1234-base for traceability
            type=sha,suffix=-base

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push :base
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          build-args: |
            INCLUDE_VLLM=0
            PRELOAD_MODEL=0
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=base
          cache-to: type=gha,mode=max,scope=base

  build-vllm:
    name: Build :vllm (hermes + vLLM, no model preload)
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v6

      - name: Log in to ghcr.io
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # :vllm and :latest on every main push
            type=raw,value=vllm,enable={{is_default_branch}}
            type=raw,value=latest,enable={{is_default_branch}}
            # :v1.2.3-vllm and :v1.2.3 on version tags
            type=semver,pattern={{version}},suffix=-vllm
            type=semver,pattern={{version}}
            # :sha-abc1234-vllm for traceability
            type=sha,suffix=-vllm

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build and push :vllm
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          # PRELOAD_MODEL=0 — model preload would exceed GitHub Actions free runner disk (14 GB)
          # Download the model at pod startup instead (cold start ~5 min) or use a RunPod Network Volume
          build-args: |
            INCLUDE_VLLM=1
            PRELOAD_MODEL=0
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=vllm
          cache-to: type=gha,mode=max,scope=vllm
